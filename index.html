<script>
/**
 * 効果音エンジン (Web Audio API)
 */
class AudioEngine {
  constructor() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  }
  playTone(freq, type, duration, vol = 0.1) {
    if (this.ctx.state === 'suspended') this.ctx.resume();
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.start(); osc.stop(this.ctx.currentTime + duration);
  }
  playTap() { this.playTone(600, 'sine', 0.1, 0.05); }
  playChain(count) { this.playTone(400 + count * 50, 'sine', 0.1, 0.1); }
  playClear() { this.playTone(800, 'square', 0.15, 0.05); }
  playBomb() { this.playTone(100, 'sawtooth', 0.4, 0.2); }
  playSkill() { this.playTone(1200, 'triangle', 0.5, 0.1); setTimeout(()=>this.playTone(1600, 'triangle', 0.5, 0.1), 100); }
  playGacha() { this.playTone(500, 'square', 0.2, 0.1); setTimeout(()=>this.playTone(800, 'square', 0.4, 0.1), 200); }
}

/**
 * データ管理 (IndexedDB / LocalStorage Fallback)
 */
class DataManager {
  constructor(app) {
    this.app = app;
    this.saveData = {
      coins: 40000, odaTickets: 0, currentTsum: 'poland',
      chars: { poland: { level: 1, skillLevel: 1, cap: 30 } }
    };
  }
  
  init() {
    return new Promise((resolve) => {
      const saved = localStorage.getItem('pb_save');
      if (saved) {
        try { Object.assign(this.saveData, JSON.parse(saved)); } catch(e){}
      }
      resolve();
    });
  }

  save() { localStorage.setItem('pb_save', JSON.stringify(this.saveData)); this.app.updateUI(); }

  addCoin(amount) { this.saveData.coins += amount; this.save(); }
  consumeCoin(amount) {
    if (this.saveData.coins >= amount) { this.saveData.coins -= amount; this.save(); return true; }
    return false;
  }
  
  addOdaTicket(amount) { this.saveData.odaTickets += amount; this.save(); }
  
  gainChar(charId) {
    if (this.saveData.chars[charId]) {
      // 被り
      this.addOdaTicket(1);
      return { isNew: false, msg: '既に持っているキャラです。ODAチケットを獲得！' };
    } else {
      this.saveData.chars[charId] = { level: 1, skillLevel: 1, cap: 30 };
      this.save();
      return { isNew: true, msg: '新しいキャラをゲット！' };
    }
  }

  exportData() {
    const dataStr = "data:text/plain;charset=utf-8," + encodeURIComponent(btoa(JSON.stringify(this.saveData)));
    const downloadAnchorNode = document.createElement('a');
    downloadAnchorNode.setAttribute("href",     dataStr);
    downloadAnchorNode.setAttribute("download", "polandball_save.txt");
    document.body.appendChild(downloadAnchorNode);
    downloadAnchorNode.click();
    downloadAnchorNode.remove();
  }

  importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const decoded = atob(e.target.result);
        const parsed = JSON.parse(decoded);
        if (parsed.coins !== undefined) {
          this.saveData = parsed; this.save();
          alert('セーブデータを読み込みました！');
          this.app.showScreen('title-screen');
        }
      } catch(err) { alert('不正なファイルです。'); }
    };
    reader.readAsText(file);
  }
}

/**
 * ゲームエンジン (Matter.js と DOMの連携)
 */
class GameEngine {
  constructor(containerId, app) {
    this.app = app;
    this.container = document.getElementById(containerId);
    this.width = this.container.clientWidth;
    this.height = this.container.clientHeight;
    
    // Matter.js setup
    // ※修正: enableSleepingをfalseにして、ボールが途中で空中で固定されないようにする
    this.engine = Matter.Engine.create({ enableSleeping: false });
    this.world = this.engine.world;
    this.world.gravity.y = 1.2; // 少し重めにしてしっかり落ちるように
    
    this.tsums = [];
    this.runner = null;
    this.isPlaying = false;
    
    // 壁作成 (見えない壁)
    const wallOptions = { isStatic: true, friction: 0.1, restitution: 0.2 };
    Matter.World.add(this.world, [
      Matter.Bodies.rectangle(this.width/2, this.height + 25, this.width, 50, wallOptions), // 床
      Matter.Bodies.rectangle(-25, this.height/2, 50, this.height*2, wallOptions), // 左壁
      Matter.Bodies.rectangle(this.width + 25, this.height/2, 50, this.height*2, wallOptions) // 右壁
    ]);

    // 入力関連
    this.isDragging = false;
    this.chain = [];
    
    this.setupEvents();
  }

  start(charPool) {
    this.container.innerHTML = '<svg id="chain-canvas"></svg>'; // DOMリセット
    this.svg = document.getElementById('chain-canvas');
    this.tsums = [];
    this.charPool = charPool; // 登場する5種類のキャラID配列
    Matter.World.clear(this.world, true); // 壁は残す
    
    this.isPlaying = true;
    this.runner = Matter.Runner.create();
    Matter.Runner.run(this.runner, this.engine);
    
    this.loop = requestAnimationFrame(this.update.bind(this));
    
    // 初期ツム生成
    // ※修正: 上までしっかり溜まるように生成数を増やす (45 -> 80)
    for(let i=0; i<80; i++) {
      setTimeout(() => this.spawnTsum(), i * 30);
    }
  }

  stop() {
    this.isPlaying = false;
    if (this.runner) Matter.Runner.stop(this.runner);
    cancelAnimationFrame(this.loop);
  }

  spawnTsum(isAnschluss = false, isIsrael = false) {
    if (!this.isPlaying) return;
    const typeId = isIsrael ? 'israel' : this.charPool[Math.floor(Math.random() * this.charPool.length)];
    const radius = isAnschluss ? 50 : 28; // ボール半径
    
    const x = Math.random() * (this.width - radius*2) + radius;
    const y = -radius - Math.random() * 50; // 画面上部から

    let body, dom;
    
    if (isIsrael) {
      body = Matter.Bodies.rectangle(x, y, 50, 70, { friction: 0.5, restitution: 0.1 });
      dom = document.createElement('div');
      dom.className = 'pb-israel';
    } else {
      body = Matter.Bodies.circle(x, y, radius, { friction: 0.4, restitution: 0.1 });
      dom = document.createElement('div');
      const charData = this.app.getCharData(typeId);
      dom.className = `country-ball ${charData.css}`;
      if (isAnschluss) dom.classList.add('anschluss');
      // 目を追加
      dom.innerHTML = `<div class="eyes-container"><div class="pb-eye"></div><div class="pb-eye"></div></div>`;
      
      // カスタム国旗 (CSSにない場合)
      if (charData.flagUrl && !charData.css.startsWith('pb-')) {
        dom.style.backgroundImage = `url('${charData.flagUrl}')`;
      }
    }

    dom.dataset.id = body.id;
    dom.dataset.type = typeId;
    dom.dataset.anschluss = isAnschluss ? "1" : "0";
    dom.dataset.israel = isIsrael ? "1" : "0";
    
    this.container.appendChild(dom);
    Matter.World.add(this.world, body);
    
    this.tsums.push({ body, dom, type: typeId });
  }

  spawnBomb(x, y, type = 'normal') {
    const radius = 30;
    const body = Matter.Bodies.circle(x, y, radius, { friction: 0.5, restitution: 0.1 });
    const dom = document.createElement('div');
    dom.className = `magic-bomb ${type === 'time' ? 'time-bomb' : type === 'score' ? 'score-bomb' : ''}`;
    dom.innerText = type === 'time' ? 'T' : type === 'score' ? 'S' : 'B';
    dom.dataset.id = body.id;
    dom.dataset.isBomb = "1";
    dom.dataset.bombType = type;
    
    // ボムタップイベント
    dom.addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      this.explodeBomb(body.id, x, y, type);
    });

    this.container.appendChild(dom);
    Matter.World.add(this.world, body);
    this.tsums.push({ body, dom, type: 'bomb' });
  }

  explodeBomb(id, x, y, type) {
    if (!this.isPlaying) return;
    this.app.audio.playBomb();
    
    // 対象のボムを削除
    this.removeTsumById(id);
    
    // 周囲を巻き込む
    const blastRadius = 120;
    let erasedCount = 0;
    let containsMyTsum = 0;

    this.tsums.forEach(t => {
      if (t.type === 'bomb') return;
      const dx = t.body.position.x - x;
      const dy = t.body.position.y - y;
      if (dx*dx + dy*dy < blastRadius*blastRadius) {
        if (t.type === this.app.data.saveData.currentTsum) containsMyTsum++;
        this.removeTsumById(t.body.id);
        erasedCount++;
      }
    });

    this.app.addScore(erasedCount * 100);
    this.app.addCoinFromChain(erasedCount); // ボム消去もコイン対象
    this.app.addSkillGauge(containsMyTsum);
    
    if (type === 'time') this.app.addTime(2);
  }

  update() {
    if (!this.isPlaying) return;

    // DOM位置同期
    let activeCount = 0;
    for (let i = this.tsums.length - 1; i >= 0; i--) {
      const t = this.tsums[i];
      // 画面外に落ちたら削除
      if (t.body.position.y > this.height + 100) {
        this.removeTsumById(t.body.id);
        continue;
      }
      activeCount++;
      t.dom.style.transform = `translate(${t.body.position.x - t.dom.offsetWidth/2}px, ${t.body.position.y - t.dom.offsetHeight/2}px) rotate(${t.body.angle}rad)`;
    }

    // ボール補充
    // ※修正: 補充上限を増やして画面上部まで溜まるようにする
    if (activeCount < 80 && Math.random() < 0.3) {
      // レア判定
      const r = Math.random();
      if (r < 0.005) this.spawnTsum(false, true); // イスラエル
      else if (r < 0.02) this.spawnTsum(true, false); // アンシュルス
      else this.spawnTsum();
    }

    this.drawChain();
    this.loop = requestAnimationFrame(this.update.bind(this));
  }

  removeTsumById(id) {
    const idx = this.tsums.findIndex(t => t.body.id === id);
    if (idx !== -1) {
      const t = this.tsums[idx];
      Matter.World.remove(this.world, t.body);
      if(t.dom.parentNode) t.dom.parentNode.removeChild(t.dom);
      this.tsums.splice(idx, 1);
    }
  }

  // --- 入力とチェーン判定 ---
  setupEvents() {
    this.container.addEventListener('pointerdown', this.onPointerDown.bind(this));
    this.container.addEventListener('pointermove', this.onPointerMove.bind(this));
    window.addEventListener('pointerup', this.onPointerUp.bind(this));
  }

  getTsumAtPoint(x, y) {
    const hitBodies = Matter.Query.point(this.tsums.map(t=>t.body), {x, y});
    if (hitBodies.length > 0) {
      return this.tsums.find(t => t.body.id === hitBodies[0].id);
    }
    return null;
  }

  onPointerDown(e) {
    if (!this.isPlaying) return;
    const rect = this.container.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    const tsum = this.getTsumAtPoint(x, y);
    if (tsum && tsum.type !== 'bomb') {
      if (tsum.dom.dataset.israel === "1") {
        this.activateIsrael();
        return;
      }
      this.isDragging = true;
      this.chain = [tsum];
      tsum.dom.classList.add('active');
      this.app.audio.playTap();
    }
  }

  onPointerMove(e) {
    if (!this.isDragging || !this.isPlaying) return;
    const rect = this.container.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const tsum = this.getTsumAtPoint(x, y);
    if (tsum && tsum.type === this.chain[0].type && !this.chain.includes(tsum)) {
      const last = this.chain[this.chain.length - 1];
      const dist = Math.hypot(tsum.body.position.x - last.body.position.x, tsum.body.position.y - last.body.position.y);
      // つながる距離判定（シビアすぎない）
      if (dist < 85) {
        this.chain.push(tsum);
        tsum.dom.classList.add('active');
        this.app.audio.playChain(this.chain.length);
      }
    }
  }

  onPointerUp(e) {
    if (!this.isDragging) return;
    this.isDragging = false;
    
    // なぞり終了、判定
    if (this.chain.length >= 3) {
      this.app.audio.playClear();
      let eraseCount = 0;
      let myTsumCount = 0;
      let lastPos = {x:0, y:0};

      this.chain.forEach(t => {
        const isAnsch = t.dom.dataset.anschluss === "1";
        const val = isAnsch ? 2 : 1;
        eraseCount += val;
        if (t.type === this.app.data.saveData.currentTsum) myTsumCount += val;
        lastPos = {x: t.body.position.x, y: t.body.position.y};
        
        // エフェクト
        this.app.createFloatText(t.body.position.x, t.body.position.y, '+');
        this.removeTsumById(t.body.id);
      });

      this.app.addScore(eraseCount * 50 + (this.chain.length * 10));
      this.app.addCoinFromChain(eraseCount); // チェーン数基準でコイン
      this.app.addSkillGauge(myTsumCount);

      // ボム発生 (7以上)
      if (eraseCount >= 7) {
        const type = eraseCount >= 10 && Math.random() < 0.3 ? 'time' : 'normal';
        this.spawnBomb(lastPos.x, lastPos.y, type);
      }
    } else {
      // 失敗時は光を戻す
      this.chain.forEach(t => t.dom.classList.remove('active'));
    }
    
    this.chain = [];
    this.drawChain(); // 線を消す
  }

  drawChain() {
    if (!this.svg) return;
    if (this.chain.length < 2) {
      this.svg.innerHTML = '';
      return;
    }
    let points = this.chain.map(t => `${t.body.position.x},${t.body.position.y}`).join(' ');
    this.svg.innerHTML = `<polyline points="${points}" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>`;
  }

  activateIsrael() {
    // 全消去＆全コイン
    this.app.audio.playBomb();
    let count = 0;
    this.tsums.forEach(t => {
      this.app.createFloatText(t.body.position.x, t.body.position.y, '💰');
      this.removeTsumById(t.body.id);
      count++;
    });
    this.app.addScore(count * 200);
    this.app.addCoinFromChain(count * 2); // 大量コイン
  }

  shuffle() {
    this.app.audio.playTap();
    this.tsums.forEach(t => {
      const fx = (Math.random() - 0.5) * 0.05;
      const fy = -Math.random() * 0.05 - 0.02;
      Matter.Body.applyForce(t.body, t.body.position, {x: fx, y: fy});
    });
  }

  // スキル用API群
  clearCenter(radius) {
    let count=0; let my=0;
    this.tsums.forEach(t => {
      const dx = t.body.position.x - this.width/2;
      const dy = t.body.position.y - this.height/2;
      if (dx*dx + dy*dy < radius*radius) {
        if(t.type === this.app.data.saveData.currentTsum) my++;
        this.removeTsumById(t.body.id); count++;
      }
    });
    return {count, my};
  }
  clearHorizontal(y, height) {
    let count=0; let my=0;
    this.tsums.forEach(t => {
      if (t.body.position.y > y - height/2 && t.body.position.y < y + height/2) {
        if(t.type === this.app.data.saveData.currentTsum) my++;
        this.removeTsumById(t.body.id); count++;
      }
    });
    return {count, my};
  }
  clearVertical(x, width) {
    let count=0; let my=0;
    this.tsums.forEach(t => {
      if (t.body.position.x > x - width/2 && t.body.position.x < x + width/2) {
        if(t.type === this.app.data.saveData.currentTsum) my++;
        this.removeTsumById(t.body.id); count++;
      }
    });
    return {count, my};
  }
  clearRandom(num) {
    let count=0; let my=0;
    const shuffled = [...this.tsums].sort(() => 0.5 - Math.random());
    for(let i=0; i<Math.min(num, shuffled.length); i++) {
      if(shuffled[i].type === 'bomb') continue;
      if(shuffled[i].type === this.app.data.saveData.currentTsum) my++;
      this.removeTsumById(shuffled[i].body.id); count++;
    }
    return {count, my};
  }
}

/**
 * メインアプリケーションクラス
 */
class App {
  constructor() {
    this.audio = new AudioEngine();
    this.data = new DataManager(this);
    this.engine = new GameEngine('game-area', this);
    
    this.charsMaster = { ...BASE_CHARS };
    this.eventData = null;

    // ゲーム内ステータス
    this.score = 0;
    this.playCoins = 0;
    this.timeLeft = 0;
    this.timer = null;
    this.skillGauge = 0;
    this.skillReq = 15;
    this.isSkillReady = false;

    this.init();
  }

  async init() {
    await this.data.init();
    await this.fetchEventData();
    this.updateUI();
  }

  async fetchEventData() {
    try {
      const res = await fetch('https://raw.githubusercontent.com/PolandBallHub-Operator/polandballpuzzle/refs/heads/main/event.txt');
      if (!res.ok) throw new Error('Network response was not ok');
      const text = await res.text();
      // 余計な括弧を外してJSONパース
      const jsonStr = text.replace(/^\s*\(\s*/, '').replace(/\s*\)\s*$/, '');
      const data = JSON.parse(jsonStr);
      
      this.eventData = data;
      
      // 新キャラをマスターにマージ
      if (data.newChars) {
        for (const [key, charInfo] of Object.entries(data.newChars)) {
          this.charsMaster[key] = {
            id: key,
            name: charInfo.name,
            css: 'custom',
            flagUrl: charInfo.flagUrl,
            skill: charInfo.skill === 'custom' ? 'custom' : charInfo.skill,
            customCode: charInfo.customCode,
            skillReq: charInfo.skillReq || 15,
            desc: charInfo.skillName
          };
        }
      }
      this.buildEventGachaUI();
    } catch (err) {
      console.log('Event fetch failed, using fallback.', err);
      // イベント取得失敗時はイベントガチャを非表示に
    }
  }

  getCharData(id) { return this.charsMaster[id] || BASE_CHARS['poland']; }

  showScreen(id) {
    this.audio.playTap();
    document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    
    if (id === 'char-screen') this.buildCharList();
    if (id === 'home-screen') this.updateHomeUI();
  }

  updateUI() {
    document.getElementById('ui-coins').innerText = this.data.saveData.coins;
    document.getElementById('ui-oda').innerText = this.data.saveData.odaTickets;
    this.updateHomeUI();
  }

  updateHomeUI() {
    const myId = this.data.saveData.currentTsum;
    const char = this.getCharData(myId);
    const disp = document.getElementById('home-my-tsum');
    disp.innerHTML = this.createBallHTML(char);
    document.getElementById('home-my-tsum-name').innerText = `マイツム: ${char.name} (Lv.${this.data.saveData.chars[myId].level})`;
  }

  createBallHTML(char) {
    if (char.css !== 'custom') {
      return `<div class="country-ball ${char.css}" style="transform:scale(0.8)"><div class="eyes-container"><div class="pb-eye happy"></div><div class="pb-eye happy"></div></div></div>`;
    } else {
      return `<div class="country-ball" style="background-image:url('${char.flagUrl}'); transform:scale(0.8)"><div class="eyes-container"><div class="pb-eye happy"></div><div class="pb-eye happy"></div></div></div>`;
    }
  }

  showModal(title, contentHTML, buttonsHTML) {
    this.audio.playTap();
    const over = document.getElementById('modal-overlay');
    const box = document.getElementById('modal-content');
    box.innerHTML = `<div class="modal-title">${title}</div><div>${contentHTML}</div><div style="margin-top:20px;">${buttonsHTML}</div>`;
    over.classList.add('active');
  }
  closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }

  // --- キャラ育成画面 ---
  buildCharList() {
    const cont = document.getElementById('char-list-container');
    cont.innerHTML = '';
    
    // 持っているキャラをソートして表示
    const ownedIds = Object.keys(this.data.saveData.chars);
    ownedIds.forEach(id => {
      const char = this.getCharData(id);
      const data = this.data.saveData.chars[id];
      const div = document.createElement('div');
      div.className = `char-item ${this.data.saveData.currentTsum === id ? 'selected' : ''}`;
      div.innerHTML = `
        <div class="preview">${this.createBallHTML(char)}</div>
        <div class="lvl">Lv.${data.level}</div>
      `;
      div.onclick = () => this.showCharDetails(id);
      cont.appendChild(div);
    });
  }

  showCharDetails(id) {
    const char = this.getCharData(id);
    const data = this.data.saveData.chars[id];
    let html = `
      ${this.createBallHTML(char)}
      <p style="font-weight:bold;">${char.name}</p>
      <p>レベル: ${data.level} / ${data.cap}</p>
      <p>スキルLv: ${data.skillLevel}</p>
      <p style="font-size:0.9rem; color:#555;">${char.desc}</p>
    `;
    
    let btns = `<button class="btn btn-blue" onclick="app.setMyTsum('${id}')">マイツムにする</button>`;
    
    // レベルアップ (コイン消費)
    if (data.level < data.cap) {
      const cost = data.level * 1000;
      btns += `<button class="btn btn-gold" onclick="app.levelUp('${id}', ${cost})">LvUP (${cost}枚)</button>`;
    } else if (data.cap < 60) {
      btns += `<button class="btn btn-red" onclick="app.unlockCap('${id}')">上限解放 (20000枚)</button>`;
    }
    
    // スキルアップ (ODAチケット消費)
    if (data.skillLevel < 6) {
      btns += `<button class="btn" onclick="app.skillUp('${id}')">スキルUP (ODA 1枚)</button>`;
    }

    btns += `<button class="btn" onclick="app.closeModal()">閉じる</button>`;
    this.showModal('キャラクター情報', html, btns);
  }

  setMyTsum(id) {
    this.data.saveData.currentTsum = id;
    this.data.save();
    this.closeModal();
    this.buildCharList();
    this.updateUI();
  }

  levelUp(id, cost) {
    if (this.data.consumeCoin(cost)) {
      this.data.saveData.chars[id].level++;
      this.data.save();
      this.audio.playSkill();
      this.showCharDetails(id);
    } else {
      alert("コインが足りません！");
    }
  }

  unlockCap(id) {
    if (this.data.consumeCoin(20000)) {
      this.data.saveData.chars[id].cap += 10;
      this.data.save();
      this.audio.playSkill();
      this.showCharDetails(id);
    } else {
      alert("コインが足りません！");
    }
  }

  skillUp(id) {
    if (this.data.saveData.odaTickets >= 1) {
      this.data.saveData.odaTickets--;
      this.data.saveData.chars[id].skillLevel++;
      this.data.save();
      this.audio.playSkill();
      this.updateUI();
      this.showCharDetails(id);
    } else {
      alert("ODAチケットが足りません！ガチャ被り等で入手してください。");
    }
  }

  // --- ガチャ ---
  buildEventGachaUI() {
    const cont = document.getElementById('event-gacha-container');
    if (!this.eventData || !this.eventData.eventGacha) {
      cont.innerHTML = ''; return;
    }
    const gacha = this.eventData.eventGacha;
    cont.innerHTML = `
      <div class="gacha-banner" style="background: #e3f2fd; margin-top:20px;">
        ${gacha.thumbnail ? `<img src="${gacha.thumbnail}" alt="Event">` : ''}
        <div style="padding: 10px; text-align: center; font-weight: bold; font-size: 1.2rem; color: #1565c0;">${gacha.name}</div>
        <button class="btn btn-blue" style="width: 80%; margin: 10px auto; display: block;" onclick="app.drawGacha('event')">💰 ${gacha.cost} 引く</button>
      </div>
    `;
  }

  drawGacha(type) {
    let cost = 20000;
    let pool = HAPPY_GACHA_POOL;
    
    if (type === 'event' && this.eventData && this.eventData.eventGacha) {
      cost = this.eventData.eventGacha.cost;
      pool = this.eventData.eventGacha.pool;
    }

    if (this.data.consumeCoin(cost)) {
      this.audio.playGacha();
      const resultId = pool[Math.floor(Math.random() * pool.length)];
      const res = this.data.gainChar(resultId);
      this.updateUI();
      this.showGachaAnimation(resultId, res.msg);
    } else {
      this.showModal('エラー', 'コインが足りません！', '<button class="btn" onclick="app.closeModal()">閉じる</button>');
    }
  }

  showGachaAnimation(charId, msg) {
    const anim = document.getElementById('gacha-animation');
    const char = this.getCharData(charId);
    document.getElementById('gacha-result-char').innerHTML = this.createBallHTML(char);
    document.getElementById('gacha-result-name').innerText = char.name + ' を獲得！';
    document.getElementById('gacha-result-desc').innerText = msg;
    anim.classList.add('active');
  }

  // --- ゲームプレイ ---
  startGame() {
    this.showScreen('play-screen');
    this.score = 0;
    this.playCoins = 0;
    this.timeLeft = 60;
    this.skillGauge = 0;
    this.isSkillReady = false;
    
    const myId = this.data.saveData.currentTsum;
    const myChar = this.getCharData(myId);
    this.skillReq = myChar.skillReq - (this.data.saveData.chars[myId].skillLevel * 0.5); // スキルLvで発動しやすく

    // アイコン設定
    const iconEl = document.getElementById('skill-icon');
    if (myChar.css !== 'custom') {
      iconEl.className = `icon country-ball ${myChar.css}`;
    } else {
      iconEl.className = `icon country-ball`;
      iconEl.style.backgroundImage = `url('${myChar.flagUrl}')`;
    }
    
    this.updatePlayUI();
    
    // サブボール選出 (自分が持っていないキャラも出る仕様)
    let pool = Object.keys(this.charsMaster).filter(id => id !== myId);
    pool = pool.sort(() => 0.5 - Math.random()).slice(0, 4);
    pool.push(myId);

    this.engine.start(pool);
    
    this.timer = setInterval(() => {
      this.timeLeft--;
      this.updatePlayUI();
      if (this.timeLeft <= 0) this.endGame();
    }, 1000);
  }

  pauseGame() {
    if (!this.engine.isPlaying) return; // 既にポーズ等
    // ここでは簡易的なポーズモーダル
    clearInterval(this.timer);
    this.engine.stop();
    this.showModal('PAUSE', 'ゲームを一時停止中', `
      <button class="btn btn-blue" onclick="app.resumeGame()">再開</button>
      <button class="btn btn-red" onclick="app.quitGame()">やめる</button>
    `);
  }

  resumeGame() {
    this.closeModal();
    this.engine.isPlaying = true;
    this.engine.runner = Matter.Runner.create();
    Matter.Runner.run(this.engine.runner, this.engine.engine);
    this.engine.loop = requestAnimationFrame(this.engine.update.bind(this.engine));
    this.timer = setInterval(() => {
      this.timeLeft--;
      this.updatePlayUI();
      if (this.timeLeft <= 0) this.endGame();
    }, 1000);
  }

  quitGame() {
    this.closeModal();
    this.engine.stop();
    clearInterval(this.timer);
    this.showScreen('home-screen');
  }

  endGame() {
    clearInterval(this.timer);
    this.timer = null;
    this.engine.stop();
    this.audio.playClear();
    
    // ボーナスコイン(Lvボーナスなど)
    const myId = this.data.saveData.currentTsum;
    const lvBonus = Math.floor(this.data.saveData.chars[myId].level * 0.5); // %アップ
    const finalCoins = Math.floor(this.playCoins * (1 + lvBonus/100));
    
    this.data.addCoin(finalCoins);
    
    // 修正箇所：ボタンの onclick に app.closeModal() を追加
    this.showModal('TIME UP!', `
      <p style="font-size:1.5rem;">SCORE: ${this.score}</p>
      <p>獲得コイン: ${this.playCoins} + (Lvボーナス) = <span style="color:#f57f17; font-weight:bold;">${finalCoins}</span></p>
    `, `<button class="btn btn-gold" onclick="app.closeModal(); app.showScreen('home-screen')">OK</button>`);
  }


  updatePlayUI() {
    document.getElementById('play-score').innerText = this.score;
    document.getElementById('play-coins').innerText = this.playCoins;
    document.getElementById('play-time').innerText = this.timeLeft;
    
    const gauge = document.getElementById('skill-gauge');
    const btn = document.getElementById('skill-btn');
    const p = Math.min(100, (this.skillGauge / this.skillReq) * 100);
    gauge.style.height = `${p}%`;
    
    if (p >= 100 && !this.isSkillReady) {
      this.isSkillReady = true;
      btn.classList.add('ready');
      this.audio.playTone(1000, 'sine', 0.2, 0.1); // ピコン
    } else if (p < 100) {
      this.isSkillReady = false;
      btn.classList.remove('ready');
    }
  }

  addScore(val) { this.score += val; this.updatePlayUI(); }
  
  // 4チェーン以上でコイン発生 (人気仕様)
  addCoinFromChain(chainCount) {
    if (chainCount < 4) return;
    let coins = 0;
    if (chainCount === 4) coins = 1;
    else if (chainCount === 5) coins = 3;
    else if (chainCount === 6) coins = 5;
    else if (chainCount === 7) coins = 7;
    else if (chainCount >= 8 && chainCount <= 10) coins = 10 + (chainCount-8)*3; // 10, 13, 16
    else coins = 20 + (chainCount-11)*5; // それ以上
    this.playCoins += coins;
    this.updatePlayUI();
  }

  addTime(sec) { this.timeLeft += sec; this.updatePlayUI(); }
  
  addSkillGauge(val) {
    if (this.isSkillReady) return;
    this.skillGauge += val;
    this.updatePlayUI();
  }

  createFloatText(x, y, text) {
    const el = document.createElement('div');
    el.className = 'float-text';
    el.innerText = text;
    el.style.left = `${x}px`;
    el.style.top = `${y}px`;
    document.getElementById('game-area').appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }

  shuffleBoard() { this.engine.shuffle(); }

  useSkill() {
    if (!this.isSkillReady || !this.engine.isPlaying) return;
    this.skillGauge = 0;
    this.isSkillReady = false;
    this.updatePlayUI();
    this.audio.playSkill();

    const myId = this.data.saveData.currentTsum;
    const char = this.getCharData(myId);
    const skillLv = this.data.saveData.chars[myId].skillLevel;
    
    // カットイン演出
    const cutin = document.getElementById('skill-cutin');
    document.getElementById('skill-cutin-char').innerHTML = this.createBallHTML(char);
    document.getElementById('skill-cutin-name').innerText = char.name + ' スキル発動！';
    cutin.style.opacity = 1;
    
    setTimeout(() => {
      cutin.style.opacity = 0;
      this.executeSkill(char, skillLv);
    }, 800); // 演出後にスキル実行
  }

  executeSkill(char, skillLv) {
    let res = {count:0, my:0};
    const pow = 1 + (skillLv * 0.1); // スキルレベルによる威力補正

    if (char.skill === 'custom') {
      try {
        // カスタムスキルの実行
        const customFunc = new Function('game', char.customCode);
        customFunc(this.engine);
      } catch(e) { console.error("Custom skill error", e); }
    } else {
      switch(char.skill) {
        case 'clearCenter':
          res = this.engine.clearCenter(100 * pow); break;
        case 'clearLarge':
          res = this.engine.clearCenter(150 * pow); break;
        case 'clearRandom':
          res = this.engine.clearRandom(Math.floor(12 * pow)); break;
        case 'clearHorizontal':
          res = this.engine.clearHorizontal(this.engine.height/2, 100 * pow); break;
        case 'clearVertical':
          res = this.engine.clearVertical(this.engine.width/2, 120 * pow); break;
        case 'spawnBomb':
          for(let i=0; i<Math.floor(1 + skillLv/3); i++) {
            this.engine.spawnBomb(this.engine.width/2 + (Math.random()*40-20), this.engine.height/2);
          }
          break;
        case 'addTime':
          this.addTime(Math.floor(3 * pow)); break;
      }
    }
    
    // 消去スキルだった場合、スコアとコインを加算
    if (res.count > 0) {
      this.addScore(res.count * 100);
      // スキルによる消去は1つのチェーンとみなす（人気ルール準拠）
      this.addCoinFromChain(res.count);
      // スキルループ防止のため、スキル消去でのゲージ増加は少し減衰
      this.skillGauge += res.my * 0.5; 
      this.updatePlayUI();
      if(res.count >= 7) this.engine.spawnBomb(this.engine.width/2, this.engine.height/2);
    }
  }
}

// 起動
const app = new App();
window.app = app;

</script>
